{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Роли</h2>
    <a href="{{ url_for('hr.role_add') }}" class="btn btn-primary mb-3">
        <i class="bi bi-plus-circle"></i> Добавить роль
    </a>
    <div class="table-responsive">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Название</th>
                    <th>Описание</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                {% for role in roles %}
                <tr>
                    <td>{{ role.name }}</td>
                    <td>{{ role.description or '' }}</td>
                    <td>
                        <td>
    <a href="{{ url_for('hr.role_permissions', role_id=role.id) }}" class="btn btn-sm btn-info">Права</a>
    <a href="{{ url_for('hr.role_edit', role_id=role.id) }}" class="btn btn-sm btn-warning">Редактировать</a>
</td>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="3" class="text-center">Нет ролей</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
