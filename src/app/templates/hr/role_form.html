{% extends "base.html" %}

{% block title %}{% if role %}Редактирование{% else %}Создание{% endif %} роли{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>{% if role %}Редактировать роль{% else %}Создать роль{% endif %}</h1>
    <form method="POST">
        <div class="mb-3">
            <label for="name" class="form-label">Название *</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ role.name if role else '' }}" required>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">Описание</label>
            <textarea class="form-control" id="description" name="description" rows="2">{{ role.description if role else '' }}</textarea>
        </div>
        <h4>Разрешения</h4>
        <div class="row">
            {% for perm in permissions %}
            <div class="col-md-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="permissions" value="{{ perm.id }}" id="perm_{{ perm.id }}"
                           {% if role and perm in role.permissions %}checked{% endif %}>
                    <label class="form-check-label" for="perm_{{ perm.id }}">
                        {{ perm.name }} <small>({{ perm.codename }})</small>
                    </label>
                </div>
            </div>
            {% endfor %}
        </div>
        <button type="submit" class="btn btn-primary mt-3">Сохранить</button>
        <a href="{{ url_for('hr.roles_list') }}" class="btn btn-secondary mt-3">Отмена</a>
    </form>
</div>
{% endblock %}
