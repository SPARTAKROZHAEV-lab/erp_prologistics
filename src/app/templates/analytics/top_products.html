{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h1>Топ товаров</h1>
    <div class="mb-3">
        <a href="{{ url_for('analytics.top_products_csv') }}?{{ request.query_string.decode() }}" class="btn btn-success">Экспорт CSV</a>
    </div>
    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-header">Топ-5 по выручке</div>
                <div class="card-body">
                    <canvas id="topPieChart" style="max-height: 300px;"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-header">Детализация</div>
                <div class="card-body">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Товар</th>
                                <th>Кол-во</th>
                                <th>Выручка</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for p in products %}
                            <tr>
                                <td>{{ p.name }}</td>
                                <td>{{ p.quantity }}</td>
                                <td>{{ "{:,.0f}".format(p.revenue) }} ₽</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ctxPie = document.getElementById('topPieChart').getContext('2d');
    new Chart(ctxPie, {
        type: 'doughnut',
        data: {
            labels: {{ top5_names | tojson }},
            datasets: [{
                data: {{ top5_values | tojson }},
                backgroundColor: ['#FF5252', '#FF9800', '#FFEB3B', '#4CAF50', '#2196F3']
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });
</script>
{% endblock %}
