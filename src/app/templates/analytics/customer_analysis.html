{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h1>Анализ клиентов</h1>
    <div class="mb-3">
        <a href="{{ url_for('analytics.customer_analysis_csv') }}?{{ request.query_string.decode() }}" class="btn btn-success">Экспорт CSV</a>
    </div>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Клиент</th>
                <th>Количество заказов</th>
                <th>Сумма покупок</th>
            </tr>
        </thead>
        <tbody>
            {% for c in customers %}
            <tr>
                <td>{{ c.name }}</td>
                <td>{{ c.orders }}</td>
                <td>{{ "{:,.0f}".format(c.spent) }} ₽</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
