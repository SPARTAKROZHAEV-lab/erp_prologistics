{% extends "base.html" %}

{% block title %}{% if warehouse %}Редактирование{% else %}Добавление{% endif %} склада{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>{% if warehouse %}Редактировать склад{% else %}Добавить склад{% endif %}</h1>
    <form method="POST">
        <div class="mb-3">
            <label for="name" class="form-label">Название *</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ warehouse.name if warehouse else '' }}" required>
        </div>
        <div class="mb-3">
            <label for="location" class="form-label">Расположение</label>
            <input type="text" class="form-control" id="location" name="location" value="{{ warehouse.location if warehouse else '' }}">
        </div>
        {% if warehouse %}
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="is_active" name="is_active" {% if warehouse.is_active %}checked{% endif %}>
            <label class="form-check-label" for="is_active">Склад активен</label>
        </div>
        {% endif %}
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{{ url_for('inventory.warehouses_list') }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
