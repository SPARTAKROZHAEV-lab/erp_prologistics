{% extends "base.html" %}

{% block title %}{% if product %}Редактирование{% else %}Добавление{% endif %} товара{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>{% if product %}Редактировать товар{% else %}Добавить товар{% endif %}</h1>
    <form method="POST">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="sku" class="form-label">Артикул *</label>
                <input type="text" class="form-control" id="sku" name="sku" value="{{ product.sku if product else '' }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="barcode" class="form-label">Штрих-код</label>
                <input type="text" class="form-control" id="barcode" name="barcode" value="{{ product.barcode if product else '' }}">
            </div>
        </div>
        <div class="mb-3">
            <label for="name" class="form-label">Наименование *</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ product.name if product else '' }}" required>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">Описание</label>
            <textarea class="form-control" id="description" name="description" rows="3">{{ product.description if product else '' }}</textarea>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="category_id" class="form-label">Категория</label>
                <select class="form-control" id="category_id" name="category_id">
                    <option value="">-- Не выбрано --</option>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}" {% if product and product.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label for="unit" class="form-label">Единица измерения</label>
                <input type="text" class="form-control" id="unit" name="unit" value="{{ product.unit if product else 'шт' }}">
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="price" class="form-label">Цена</label>
                <input type="number" step="0.01" class="form-control" id="price" name="price" value="{{ product.price if product else '' }}">
            </div>
            <div class="col-md-6 mb-3">
                <label for="cost" class="form-label">Себестоимость</label>
                <input type="number" step="0.01" class="form-control" id="cost" name="cost" value="{{ product.cost if product else '' }}">
            </div>
        </div>
        {% if product %}
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="is_active" name="is_active" {% if product.is_active %}checked{% endif %}>
            <label class="form-check-label" for="is_active">Товар активен</label>
        </div>
        {% endif %}
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{{ url_for('inventory.products_list') }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
