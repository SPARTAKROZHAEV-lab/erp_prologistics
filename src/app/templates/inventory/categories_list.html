{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Категории</h2>
    <a href="{{ url_for('inventory.category_add') }}" class="btn btn-primary mb-3">
        <i class="bi bi-plus-circle"></i> Добавить категорию
    </a>
    <div class="table-responsive">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Название</th>
                    <th>Описание</th>
                    <th>Родительская</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                {% for cat in categories %}
                <tr>
                    <td>{{ cat.name }}</td>
                    <td>{{ cat.description or '' }}</td>
                    <td>{{ cat.parent.name if cat.parent else '' }}</td>
                    <td>
                        <a href="{{ url_for('inventory.category_edit', category_id=cat.id) }}" class="btn btn-sm btn-warning" title="Редактировать">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form action="{{ url_for('inventory.category_delete', category_id=cat.id) }}" method="POST" style="display:inline;">
                            <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Удалить категорию?')" title="Удалить">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="4" class="text-center">Нет категорий</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
