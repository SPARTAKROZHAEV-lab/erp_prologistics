{% extends "base.html" %}

{% block title %}Приход товара{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>Приход товара на склад</h1>
    <form method="POST">
        <div class="mb-3">
            <label for="product_id" class="form-label">Товар *</label>
            <select class="form-control" id="product_id" name="product_id" required>
                <option value="">-- Выберите товар --</option>
                {% for prod in products %}
                    <option value="{{ prod.id }}" {% if selected_product == prod.id %}selected{% endif %}>{{ prod.name }} ({{ prod.sku }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="supplier_id" class="form-label">Поставщик</label>
            <select class="form-control" id="supplier_id" name="supplier_id">
                <option value="">-- Не выбран --</option>
                {% for sup in suppliers %}
                    <option value="{{ sup.id }}">{{ sup.name }} {% if sup.inn %} (ИНН {{ sup.inn }}){% endif %}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="to_warehouse_id" class="form-label">Склад назначения *</label>
            <select class="form-control" id="to_warehouse_id" name="to_warehouse_id" required>
                <option value="">-- Выберите склад --</option>
                {% for wh in warehouses %}
                    <option value="{{ wh.id }}">{{ wh.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="quantity" class="form-label">Количество *</label>
            <input type="number" step="0.01" class="form-control" id="quantity" name="quantity" required>
        </div>
        <div class="mb-3">
            <label for="price" class="form-label">Цена закупки (опционально)</label>
            <input type="number" step="0.01" class="form-control" id="price" name="price">
        </div>
        <div class="mb-3">
            <label for="comment" class="form-label">Комментарий</label>
            <textarea class="form-control" id="comment" name="comment" rows="2"></textarea>
        </div>
        <button type="submit" class="btn btn-success">Выполнить приход</button>
        <a href="{{ url_for('inventory.stocks_list') }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
