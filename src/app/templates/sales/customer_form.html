{% extends "base.html" %}

{% block title %}{% if customer %}Редактирование{% else %}Добавление{% endif %} контрагента{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>{% if customer %}Редактировать контрагента{% else %}Добавить контрагента{% endif %}</h1>
    <form method="POST">
        <div class="mb-3">
            <label for="type" class="form-label">Тип контрагента</label>
            <select class="form-control" id="type" name="type" required>
                <option value="individual" {% if customer and customer.type == 'individual' %}selected{% endif %}>Физическое лицо</option>
                <option value="legal" {% if customer and customer.type == 'legal' %}selected{% endif %}>Юридическое лицо</option>
            </select>
        </div>

        <!-- Общее название (для отображения) -->
        <div class="mb-3">
            <label for="name" class="form-label">Отображаемое название *</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ customer.name if customer else '' }}" required>
        </div>

        <!-- Поля для физлица -->
        <div id="individual-fields" style="display: {% if not customer or customer.type == 'individual' %}block{% else %}none{% endif %};">
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="last_name" class="form-label">Фамилия</label>
                    <input type="text" class="form-control" id="last_name" name="last_name" value="{{ customer.last_name if customer else '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="first_name" class="form-label">Имя</label>
                    <input type="text" class="form-control" id="first_name" name="first_name" value="{{ customer.first_name if customer else '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="middle_name" class="form-label">Отчество</label>
                    <input type="text" class="form-control" id="middle_name" name="middle_name" value="{{ customer.middle_name if customer else '' }}">
                </div>
            </div>
        </div>

        <!-- Поля для юрлица -->
        <div id="legal-fields" style="display: {% if customer and customer.type == 'legal' %}block{% else %}none{% endif %};">
            <div class="mb-3">
                <label for="legal_name" class="form-label">Полное наименование</label>
                <input type="text" class="form-control" id="legal_name" name="legal_name" value="{{ customer.legal_name if customer else '' }}">
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="inn" class="form-label">ИНН</label>
                    <input type="text" class="form-control" id="inn" name="inn" value="{{ customer.inn if customer else '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="kpp" class="form-label">КПП</label>
                    <input type="text" class="form-control" id="kpp" name="kpp" value="{{ customer.kpp if customer else '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="ogrn" class="form-label">ОГРН</label>
                    <input type="text" class="form-control" id="ogrn" name="ogrn" value="{{ customer.ogrn if customer else '' }}">
                </div>
            </div>
        </div>

        <!-- Контактные данные (общие) -->
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="phone" class="form-label">Телефон</label>
                <input type="text" class="form-control" id="phone" name="phone" value="{{ customer.phone if customer else '' }}">
            </div>
            <div class="col-md-6 mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" value="{{ customer.email if customer else '' }}">
            </div>
        </div>
        <div class="mb-3">
            <label for="address" class="form-label">Адрес</label>
            <textarea class="form-control" id="address" name="address" rows="2">{{ customer.address if customer else '' }}</textarea>
        </div>
        <div class="mb-3">
            <label for="note" class="form-label">Примечание</label>
            <textarea class="form-control" id="note" name="note" rows="2">{{ customer.note if customer else '' }}</textarea>
        </div>
        {% if customer %}
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="is_active" name="is_active" {% if customer.is_active %}checked{% endif %}>
            <label class="form-check-label" for="is_active">Активен</label>
        </div>
        {% endif %}
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{{ url_for('sales.customers_list') }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const typeSelect = document.getElementById('type');
        const individualFields = document.getElementById('individual-fields');
        const legalFields = document.getElementById('legal-fields');

        function toggleFields() {
            if (typeSelect.value === 'individual') {
                individualFields.style.display = 'block';
                legalFields.style.display = 'none';
            } else {
                individualFields.style.display = 'none';
                legalFields.style.display = 'block';
            }
        }

        typeSelect.addEventListener('change', toggleFields);
        toggleFields();
    });
</script>
{% endblock %}
