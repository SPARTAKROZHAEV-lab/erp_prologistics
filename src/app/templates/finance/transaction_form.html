{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>{% if transaction %}Редактировать{% else %}Добавить{% endif %} транзакцию</h2>
    <form method="post">
        <div class="mb-3">
            <label for="type" class="form-label">Тип</label>
            <select class="form-select" id="type" name="type" required>
                <option value="income" {% if transaction and transaction.type == 'income' %}selected{% endif %}>Доход</option>
                <option value="expense" {% if transaction and transaction.type == 'expense' %}selected{% endif %}>Расход</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="category_id" class="form-label">Категория</label>
            <select class="form-select" id="category_id" name="category_id">
                <option value="">-- Не выбрано --</option>
                {% for cat in categories %}
                <option value="{{ cat.id }}" {% if transaction and transaction.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="amount" class="form-label">Сумма</label>
            <input type="number" step="0.01" class="form-control" id="amount" name="amount" value="{{ transaction.amount if transaction else '' }}" required>
        </div>
        <div class="mb-3">
            <label for="currency" class="form-label">Валюта</label>
            <input type="text" class="form-control" id="currency" name="currency" value="{{ transaction.currency if transaction else 'RUB' }}" required>
        </div>
        <div class="mb-3">
            <label for="transaction_date" class="form-label">Дата операции</label>
            <input type="date" class="form-control" id="transaction_date" name="transaction_date" value="{{ transaction.transaction_date.strftime('%Y-%m-%d') if transaction else now().strftime('%Y-%m-%d') }}" required>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">Описание</label>
            <input type="text" class="form-control" id="description" name="description" value="{{ transaction.description if transaction else '' }}">
        </div>
        <div class="mb-3">
            <label for="customer_id" class="form-label">Контрагент</label>
            <select class="form-select" id="customer_id" name="customer_id">
                <option value="">-- Не выбрано --</option>
                {% for cust in customers %}
                <option value="{{ cust.id }}" {% if transaction and transaction.customer_id == cust.id %}selected{% endif %}>{{ cust.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="order_id" class="form-label">Заказ</label>
            <select class="form-select" id="order_id" name="order_id">
                <option value="">-- Не выбран --</option>
                {% for order in orders %}
                <option value="{{ order.id }}" {% if transaction and transaction.order_id == order.id %}selected{% endif %}>Заказ №{{ order.id }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="comment" class="form-label">Комментарий</label>
            <textarea class="form-control" id="comment" name="comment" rows="2">{{ transaction.comment if transaction else '' }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{{ url_for('finance.transactions_list') }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
