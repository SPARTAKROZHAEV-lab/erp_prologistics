{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>{% if transaction %}Редактировать{% else %}Добавить{% endif %} транзакцию</h2>
    <form method="post" id="transactionForm">
        <div class="mb-3">
            <label for="type" class="form-label">Тип</label>
            <select class="form-select" id="type" name="type" required>
                <option value="income" {% if transaction and transaction.type == 'income' %}selected{% endif %}>Доход</option>
                <option value="expense" {% if transaction and transaction.type == 'expense' %}selected{% endif %}>Расход</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="category_id" class="form-label">Категория</label>
            <select class="form-select" id="category_id" name="category_id">
                <option value="">-- Не выбрано --</option>
                {% for cat in categories %}
                <option value="{{ cat.id }}" {% if transaction and transaction.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="amount" class="form-label">Сумма</label>
            <input type="number" step="0.01" class="form-control" id="amount" name="amount" value="{{ transaction.amount if transaction else '' }}" required>
        </div>
        <div class="mb-3">
            <label for="currency" class="form-label">Валюта</label>
            <input type="text" class="form-control" id="currency" name="currency" value="{{ transaction.currency if transaction else 'RUB' }}" required>
        </div>
        <div class="mb-3">
            <label for="transaction_date" class="form-label">Дата операции</label>
            <input type="date" class="form-control" id="transaction_date" name="transaction_date" value="{{ transaction.transaction_date.strftime('%Y-%m-%d') if transaction else now().strftime('%Y-%m-%d') }}" required>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">Описание</label>
            <input type="text" class="form-control" id="description" name="description" value="{{ transaction.description if transaction else '' }}">
        </div>
        
        <!-- Блок выбора контрагента с поиском (как в продажах) -->
        <div class="mb-3 position-relative">
            <label for="customer_search" class="form-label">Контрагент</label>
            <input type="text" class="form-control" id="customer_search" placeholder="Введите название, email или телефон..." autocomplete="off" 
                   value="{{ transaction.customer.name if transaction and transaction.customer else '' }}">
            <input type="hidden" id="customer_id" name="customer_id" value="{{ transaction.customer_id if transaction else '' }}">
            <div id="customer_results" class="list-group position-absolute w-100" style="z-index: 1000; max-height: 200px; overflow-y: auto; display: none;"></div>
        </div>

        <!-- Блок выбора заказа с поиском -->
        <div class="mb-3 position-relative">
            <label for="order_search" class="form-label">Заказ</label>
            <input type="text" class="form-control" id="order_search" placeholder="Введите номер заказа..." autocomplete="off"
                   value="{{ transaction.order.order_number if transaction and transaction.order else '' }}">
            <input type="hidden" id="order_id" name="order_id" value="{{ transaction.order_id if transaction else '' }}">
            <div id="order_results" class="list-group position-absolute w-100" style="z-index: 1000; max-height: 200px; overflow-y: auto; display: none;"></div>
            <small class="form-text text-muted" id="order_info"></small>
        </div>

        <div class="mb-3">
            <label for="comment" class="form-label">Комментарий</label>
            <textarea class="form-control" id="comment" name="comment" rows="2">{{ transaction.comment if transaction else '' }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{{ url_for('finance.transactions_list') }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Поиск контрагентов (как в продажах)
    const customerInput = document.getElementById('customer_search');
    const customerId = document.getElementById('customer_id');
    const customerResults = document.getElementById('customer_results');
    let customerTimeout;

    customerInput.addEventListener('input', function() {
        clearTimeout(customerTimeout);
        const query = this.value.trim();
        if (query.length < 2) {
            customerResults.style.display = 'none';
            return;
        }
        customerTimeout = setTimeout(() => {
            fetch(`/sales/customers/search?q=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    customerResults.innerHTML = '';
                    if (data.results.length > 0) {
                        data.results.forEach(item => {
                            const a = document.createElement('a');
                            a.href = '#';
                            a.className = 'list-group-item list-group-item-action';
                            a.dataset.id = item.id;
                            a.textContent = item.text;
                            a.addEventListener('click', function(e) {
                                e.preventDefault();
                                customerInput.value = this.textContent;
                                customerId.value = this.dataset.id;
                                customerResults.style.display = 'none';
                            });
                            customerResults.appendChild(a);
                        });
                        customerResults.style.display = 'block';
                    } else {
                        customerResults.style.display = 'none';
                    }
                });
        }, 300);
    });

    customerInput.addEventListener('blur', function() {
        setTimeout(() => { customerResults.style.display = 'none'; }, 200);
    });

    // Поиск заказов
    const orderInput = document.getElementById('order_search');
    const orderId = document.getElementById('order_id');
    const orderResults = document.getElementById('order_results');
    const orderInfo = document.getElementById('order_info');
    let orderTimeout;

    orderInput.addEventListener('input', function() {
        clearTimeout(orderTimeout);
        const query = this.value.trim();
        if (query.length < 2) {
            orderResults.style.display = 'none';
            return;
        }
        orderTimeout = setTimeout(() => {
            fetch(`/finance/orders/search?q=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    orderResults.innerHTML = '';
                    if (data.results.length > 0) {
                        data.results.forEach(item => {
                            const a = document.createElement('a');
                            a.href = '#';
                            a.className = 'list-group-item list-group-item-action';
                            a.dataset.id = item.id;
                            a.textContent = item.text;
                            a.addEventListener('click', function(e) {
                                e.preventDefault();
                                orderInput.value = this.textContent;
                                orderId.value = this.dataset.id;
                                orderResults.style.display = 'none';
                                // Можно дополнительно получить детали заказа (если нужно)
                                // и отобразить их в orderInfo
                                orderInfo.textContent = 'Заказ выбран';
                            });
                            orderResults.appendChild(a);
                        });
                        orderResults.style.display = 'block';
                    } else {
                        orderResults.style.display = 'none';
                    }
                });
        }, 300);
    });

    orderInput.addEventListener('blur', function() {
        setTimeout(() => { orderResults.style.display = 'none'; }, 200);
    });

    // Если при редактировании уже есть заказ, покажем информацию
    {% if transaction and transaction.order %}
        orderInfo.textContent = 'Заказ №{{ transaction.order.order_number }} от {{ transaction.order.order_date.strftime("%d.%m.%Y") }}, сумма {{ transaction.order.total_amount }}';
    {% endif %}
});
</script>
{% endblock %}
