{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Добавить платёж по счёту № {{ invoice.number }}</h2>
    <p><strong>Остаток к оплате:</strong> {{ remaining }}</p>
    <form method="post" id="paymentForm">
        <div class="mb-3">
            <label for="amount" class="form-label">Сумма</label>
            <input type="number" step="0.01" class="form-control" id="amount" name="amount" required>
            <div id="amountWarning" class="text-danger" style="display: none;">Внимание: сумма превышает остаток!</div>
        </div>
        <div class="mb-3">
            <label for="payment_date" class="form-label">Дата и время платежа</label>
            <input type="datetime-local" class="form-control" id="payment_date" name="payment_date" value="{{ now().strftime('%Y-%m-%dT%H:%M') }}">
        </div>
        <div class="mb-3">
            <label for="method" class="form-label">Способ оплаты</label>
            <select class="form-select" id="method" name="method">
                <option value="cash">Наличные</option>
                <option value="bank_transfer">Банковский перевод</option>
                <option value="card">Банковская карта</option>
                <option value="other">Другое</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="reference" class="form-label">Номер документа (п/п, чек)</label>
            <input type="text" class="form-control" id="reference" name="reference">
        </div>
        <div class="mb-3">
            <label for="status" class="form-label">Статус платежа</label>
            <select class="form-select" id="status" name="status">
                <option value="pending">Ожидает</option>
                <option value="completed" selected>Проведён</option>
                <option value="failed">Ошибка</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="comment" class="form-label">Комментарий</label>
            <textarea class="form-control" id="comment" name="comment" rows="2"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{{ url_for('finance.invoice_detail', id=invoice.id) }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>

<script>
    const amountInput = document.getElementById('amount');
    const amountWarning = document.getElementById('amountWarning');
    const remaining = {{ remaining }};

    amountInput.addEventListener('input', function() {
        const value = parseFloat(this.value) || 0;
        if (value > remaining) {
            amountWarning.style.display = 'block';
        } else {
            amountWarning.style.display = 'none';
        }
    });
</script>
{% endblock %}
