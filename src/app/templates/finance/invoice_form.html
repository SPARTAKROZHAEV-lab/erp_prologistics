{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Создать новый счёт</h2>
    <form method="post" id="invoiceForm">
        <div class="mb-3">
            <label for="number" class="form-label">Номер счёта</label>
            <input type="text" class="form-control" id="number" name="number" value="{{ invoice_number }}" required>
        </div>
        <div class="mb-3">
            <label for="customer_id" class="form-label">Контрагент</label>
            <select class="form-select" id="customer_id" name="customer_id" required>
                <option value="">Выберите...</option>
                {% for customer in customers %}
                <option value="{{ customer.id }}">{{ customer.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="order_id" class="form-label">Заказ (если есть)</label>
            <select class="form-select" id="order_id" name="order_id">
                <option value="">-- Не выбран --</option>
                {% for order in orders %}
                <option value="{{ order.id }}" 
                        data-customer="{{ order.customer_id }}"
                        data-amount="{{ order.total_amount }}"
                        data-date="{{ order.order_date.strftime('%Y-%m-%d') }}">
                    Заказ №{{ order.id }} от {{ order.order_date.strftime('%d.%m.%Y') }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="issue_date" class="form-label">Дата выставления</label>
            <input type="date" class="form-control" id="issue_date" name="issue_date" value="{{ now().strftime('%Y-%m-%d') }}" required>
        </div>
        <div class="mb-3">
            <label for="due_date" class="form-label">Срок оплаты</label>
            <input type="date" class="form-control" id="due_date" name="due_date">
        </div>
        <div class="mb-3">
            <label for="total_amount" class="form-label">Сумма</label>
            <input type="number" step="0.01" class="form-control" id="total_amount" name="total_amount" required>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">Описание</label>
            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Создать</button>
        <a href="{{ url_for('finance.invoices') }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const orderSelect = document.getElementById('order_id');
    const customerSelect = document.getElementById('customer_id');
    const totalAmount = document.getElementById('total_amount');
    const issueDate = document.getElementById('issue_date');

    orderSelect.addEventListener('change', function() {
        const selectedOption = this.options[this.selectedIndex];
        if (selectedOption.value) {
            // Получаем данные из data-атрибутов
            const customerId = selectedOption.dataset.customer;
            const amount = selectedOption.dataset.amount;
            const orderDate = selectedOption.dataset.date;

            if (customerId) {
                customerSelect.value = customerId;
            }
            if (amount) {
                totalAmount.value = amount;
            }
            if (orderDate) {
                issueDate.value = orderDate;
            }
        }
        // Если заказ снят, поля не очищаем (пользователь может ввести вручную)
    });
});
</script>
{% endblock %}
