{% extends "base.html" %}

{% block title %}Редактирование ролей пользователя{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>Редактирование ролей: {{ user.email }}</h1>
    <form method="POST">
        <div class="mb-3">
            {% for role in all_roles %}
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="roles" value="{{ role.id }}" id="role_{{ role.id }}"
                       {% if role in user.roles %}checked{% endif %}>
                <label class="form-check-label" for="role_{{ role.id }}">
                    {{ role.name }} {% if role.description %}<small class="text-muted">({{ role.description }})</small>{% endif %}
                </label>
            </div>
            {% endfor %}
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{{ url_for('admin.users_list') }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
